name: Python application

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v3
      with:
        python-version: "3.10"

    - name: Install uv
      run: pip install uv

    - name: Install dependencies
      run: uv sync

    - name: Lint
      run: uv run flake8 .

    - name: Test
      run: uv run pytest
